services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vohnik
      POSTGRES_USER: vohnik_user
      POSTGRES_PASSWORD: vohnik_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/static
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://vohnik_user:vohnik_pass@db:5432/vohnik
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=0
      - ALLOWED_HOSTS=*
      - SECRET_KEY=django-insecure-vohnik-production-key-change-me
    depends_on:
      - db
      - redis

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info -Q email_queue,operations_queue
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://vohnik_user:vohnik_pass@db:5432/vohnik
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DJANGO_SETTINGS_MODULE=config.settings
      - SECRET_KEY=django-insecure-vohnik-production-key-change-me
    depends_on:
      - db
      - redis
      - web

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://vohnik_user:vohnik_pass@db:5432/vohnik
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DJANGO_SETTINGS_MODULE=config.settings
      - SECRET_KEY=django-insecure-vohnik-production-key-change-me
    depends_on:
      - db
      - redis
      - web

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - web

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_data:/media
      - static_data:/static
    depends_on:
      - web
      - frontend

volumes:
  postgres_data:
  media_data:
  static_data:
